<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的小恐龍遊戲</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; font-family: sans-serif; }
        canvas { background: #fff; border: 2px solid #333; margin-top: 20px; }
        .info { margin-top: 10px; color: #666; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="200"></canvas>
    <div class="info">空白鍵跳躍 | 遊戲結束按 R 鍵重開</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const img = new Image();
img.src = 'dino.png'; // 這裡要對應你的檔名

let dino = { x: 50, y: 150, w: 40, h: 40, vy: 0, grounded: false };
let obs = [];
let score = 0;
let speed = 6;
let over = false;
let frame = 0;

function reset() {
    dino.y = 150; dino.vy = 0; obs = []; score = 0; speed = 6; over = false; frame = 0;
    loop();
}

window.onkeydown = e => {
    if (e.code === 'Space' && dino.grounded) { dino.vy = -15; dino.grounded = false; }
    if (over && e.key.toLowerCase() === 'r') reset();
};

function loop() {
    if (over) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0,0,800,200);
        ctx.fillStyle = "white";
        ctx.fillText("GAME OVER - Press R to Restart", 300, 100);
        return;
    }

    frame++;
    if (frame % 150 === 0) speed = 4 + Math.random() * 10; // 忽快忽慢邏輯
    if (frame % 100 === 0) obs.push({ x: 800, w: 20, h: 40 });

    dino.vy += 0.8;
    dino.y += dino.vy;
    if (dino.y > 150) { dino.y = 150; dino.vy = 0; dino.grounded = true; }

    ctx.clearRect(0,0,800,200);
    
    // 畫恐龍
    if (img.complete && img.naturalWidth !== 0) {
        ctx.drawImage(img, dino.x, dino.y, dino.w, dino.h);
    } else {
        ctx.fillStyle = "purple"; // 沒圖時的替代顏色
        ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
    }

    for (let i = obs.length-1; i>=0; i--) {
        obs[i].x -= speed;
        ctx.fillStyle = "red";
        ctx.fillRect(obs[i].x, 160, obs[i].w, obs[i].h);
        
        // 碰撞檢測
        if (dino.x < obs[i].x + obs[i].w && dino.x + dino.w > obs[i].x && dino.y + dino.h > 160) over = true;
        if (obs[i].x < -20) { obs.splice(i, 1); score++; }
    }
    
    ctx.fillStyle = "black";
    ctx.fillText("分數: " + score + " | 目前速度: " + speed.toFixed(1), 10, 20);
    requestAnimationFrame(loop);
}

img.onload = reset;
img.onerror = reset; // 圖片失敗也強制開始
</script>
</body>
</html>
